name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the build only needs to read repository contents.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & unit test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Third-party actions are pinned to full commit SHAs (not tags) so an upstream
      # tag move/compromise cannot change what runs here. Version in the comment.
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      # Official Gradle action: provisions the wrapper and caches the Gradle user
      # home (downloaded dependencies, wrapper dist) between runs. This is a CACHE
      # of regenerable inputs — build outputs are not persisted here. PRs read the
      # cache but do not write it (cache-write happens on main), avoiding poisoning.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # Cheapest signal first: unit tests fail fast before the more expensive assembles. This task
      # runs both the pure-store JVM tests and the Robolectric Compose integration tests
      # (createComposeRule), which drive AnimatedVisibility transitions on a
      # TestCoroutineScheduler-backed clock entirely on the JVM. The on-device suite that proves the
      # same paths against a real Android runtime lives in the separate `instrumented` job below.
      - name: Unit tests (library, incl. Robolectric Compose)
        run: ./gradlew :overlay-kit-compose:testDebugUnitTest --no-daemon --stacktrace

      - name: Assemble library (release) and sample (debug)
        run: ./gradlew :overlay-kit-compose:assembleRelease :sample:assembleDebug --no-daemon --stacktrace

  instrumented:
    name: Instrumented tests (emulator)
    runs-on: ubuntu-latest
    # Kept separate from the fast `build` job: emulator boot + connectedCheck is slow and can be
    # flaky, so it must not gate the cheap unit-test signal. Allowed to run in parallel with `build`.
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # KVM lets the x86_64 emulator run with hardware acceleration on the Linux runner; without it
      # the AVD falls back to slow software rendering and the suite times out.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # android-emulator-runner boots a headless AVD, waits for it, then runs `script` against it.
      # Pinned to a full commit SHA (v2.37.0) so an upstream tag move cannot change what executes.
      # API 35 matches the local m2_verify_api35 device the suite was authored against.
      - name: Instrumented tests on API 35 emulator
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2.37.0
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          # No window, no audio, no boot animation, no on-screen keyboard — faster, more deterministic
          # boot, and removes the on-screen keyboard as a focus competitor for the back-key tests.
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot -camera-back none
          disable-animations: true
          script: ./gradlew :overlay-kit-compose:connectedDebugAndroidTest --no-daemon --stacktrace

      - name: Upload instrumented test report
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: instrumented-test-report
          path: overlay-kit-compose/build/reports/androidTests/connected/
          if-no-files-found: ignore
